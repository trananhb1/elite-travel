<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="240" height="60" role="img" aria-label="Elite Travel">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9b25c"/>
      <stop offset="1" stop-color="#a97e2a"/>
    </linearGradient>
  </defs>

  <!-- Mark: compass / navigation motif -->
  <circle cx="60" cy="60" r="46" fill="#0b3350"/>
  <circle cx="60" cy="60" r="46" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <g transform="translate(60,60)">
    <path d="M0,-30 L8,0 L0,30 L-8,0 Z" fill="url(#gold)"/>
    <path d="M-30,0 L0,-8 L30,0 L0,8 Z" fill="#f4efe4" opacity="0.9"/>
    <circle r="4.5" fill="url(#gold)"/>
  </g>

  <!-- Wordmark -->
  <text x="126" y="56" font-family="'Be Vietnam Pro', 'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="1" fill="#0b3350">ELITE</text>
  <text x="126" y="86" font-family="'Be Vietnam Pro', 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="#a97e2a">TRAVEL</text>
</svg>
